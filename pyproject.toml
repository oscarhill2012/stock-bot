[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501", "UP047"]  # E501: line length handled by formatter; UP047: TypeVar syntax compat

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
ignore_missing_imports = true
files = ["src/agents", "src/broker", "src/orchestrator", "src/baselines"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
