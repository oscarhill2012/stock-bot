[pytest]
testpaths = tests
pythonpath = . src
asyncio_mode = auto
addopts = -ra --strict-markers
markers =
    integration: requires real LLM or external API
    replay: long-running historical backtest
    slow: long-running tests excluded from the default run (use -m slow to opt in)
    contract: behavioural contracts at layer boundaries (Phase 7.6+)
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
